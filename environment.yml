name: rag-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Core LLM / Agent framework
    - langchain==1.2.15
    - langchain-community==0.4.1
    - langchain-core==1.2.31
    - langchain-openai==1.1.14
    - langchain-text-splitters==1.1.2
    - langgraph==1.1.6
    - langgraph-prebuilt==1.0.9
    - openai==2.32.0

    # Vector store
    - faiss-cpu==1.13.2

    # Embeddings (ONNX Runtime — no PyTorch dependency)
    - fastembed==0.8.0

    # Hybrid retrieval
    - rank-bm25==0.2.2

    # Document loading
    - pypdf==6.10.2

    # arXiv API
    - arxiv==3.0.0

    # Utilities
    - python-dotenv==1.2.2
    - rich==13.9.4
